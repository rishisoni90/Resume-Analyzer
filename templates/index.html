<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Optimizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .file-name {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
            font-size: 14px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .results {
            margin-top: 30px;
            display: none;
        }
        
        .score {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
            margin-bottom: 20px;
        }
        
        .score-number {
            font-size: 48px;
            font-weight: bold;
        }
        
        .verdict {
            font-size: 24px;
            margin-top: 10px;
        }
        
        .good { color: #4caf50; }
        .moderate { color: #ff9800; }
        .poor { color: #f44336; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat {
            background: #f8f9fa;
            padding: 15px;
            text-align: center;
            border-radius: 10px;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }
        
        .keywords {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .keyword-tag {
            display: inline-block;
            background: #e0e0e0;
            padding: 5px 12px;
            border-radius: 20px;
            margin: 5px;
            font-size: 12px;
        }
        
        .keyword-tag.matching {
            background: #4caf50;
            color: white;
        }
        
        .keyword-tag.missing {
            background: #ff9800;
            color: white;
        }
        
        .download-btn {
            background: #4caf50;
            margin-top: 10px;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📄 Resume Optimizer</h1>
            <p class="subtitle">Upload your resume and job description to get an optimized version</p>
            
            <div class="upload-area" onclick="document.getElementById('resumeFile').click()">
                <div class="upload-icon">📄</div>
                <h3>Upload Resume</h3>
                <p>PDF, DOCX, or TXT</p>
                <input type="file" id="resumeFile" accept=".pdf,.docx,.txt" style="display:none">
                <div id="resumeName" class="file-name" style="display:none"></div>
            </div>
            
            <div class="upload-area" onclick="document.getElementById('jobFile').click()">
                <div class="upload-icon">💼</div>
                <h3>Upload Job Description</h3>
                <p>PDF, DOCX, or TXT</p>
                <input type="file" id="jobFile" accept=".pdf,.docx,.txt" style="display:none">
                <div id="jobName" class="file-name" style="display:none"></div>
            </div>
            
            <button onclick="analyze()" id="analyzeBtn">🔍 Analyze & Optimize</button>
            
            <div class="results" id="results"></div>
        </div>
    </div>
    
    <script>
        let currentFilename = '';
        
        document.getElementById('resumeFile').addEventListener('change', function(e) {
            if (e.target.files[0]) {
                document.getElementById('resumeName').textContent = e.target.files[0].name;
                document.getElementById('resumeName').style.display = 'inline-block';
                window.resumeFile = e.target.files[0];
            }
        });
        
        document.getElementById('jobFile').addEventListener('change', function(e) {
            if (e.target.files[0]) {
                document.getElementById('jobName').textContent = e.target.files[0].name;
                document.getElementById('jobName').style.display = 'inline-block';
                window.jobFile = e.target.files[0];
            }
        });
        
        async function analyze() {
            if (!window.resumeFile || !window.jobFile) {
                alert('Please upload both files');
                return;
            }
            
            const formData = new FormData();
            formData.append('resume', window.resumeFile);
            formData.append('job_description', window.jobFile);
            
            const btn = document.getElementById('analyzeBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Analyzing...';
            
            try {
                const response = await fetch('/analyze', { method: 'POST', body: formData });
                const data = await response.json();
                
                if (response.ok) {
                    currentFilename = data.filename;
                    displayResults(data);
                    
                    // Auto download
                    setTimeout(() => {
                        window.location.href = `/download/${data.filename}`;
                    }, 500);
                } else {
                    alert(data.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔍 Analyze & Optimize';
            }
        }
        
        function displayResults(data) {
            const verdictClass = data.verdict === 'good' ? 'good' : (data.verdict === 'moderate' ? 'moderate' : 'poor');
            const verdictText = data.verdict === 'good' ? '✅ GOOD MATCH!' : 
                               (data.verdict === 'moderate' ? '⚠️ MODERATE MATCH' : '❌ LOW MATCH');
            
            const html = `
                <div class="score">
                    <div class="score-number">${data.match_score}%</div>
                    <div class="verdict ${verdictClass}">${verdictText}</div>
                    <div style="margin-top: 10px;">📈 +${data.improvement}% potential improvement</div>
                </div>
                
                <div class="stats">
                    <div class="stat">
                        <div class="stat-number">${data.total_matching}</div>
                        <div>Keywords Found</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number">${data.total_missing}</div>
                        <div>Keywords Added</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number">${data.name}</div>
                        <div>Candidate</div>
                    </div>
                </div>
                
                <div class="keywords">
                    <strong>✅ Matching Keywords:</strong><br>
                    ${data.matching_keywords.map(k => `<span class="keyword-tag matching">${k}</span>`).join('')}
                </div>
                
                <div class="keywords">
                    <strong>✨ Added Keywords:</strong><br>
                    ${data.missing_keywords.map(k => `<span class="keyword-tag missing">${k}</span>`).join('')}
                </div>
                
                <div style="text-align: center; margin-top: 20px;">
                    <p><strong>Downloaded as:</strong> ${data.filename}</p>
                    <button class="download-btn" onclick="window.location.href='/download/${data.filename}'">
                        📥 Download Again
                    </button>
                </div>
            `;
            
            document.getElementById('results').style.display = 'block';
            document.getElementById('results').innerHTML = html;
        }
    </script>
</body>
</html>
